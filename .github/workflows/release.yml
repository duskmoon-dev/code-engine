name: Release

on:
  workflow_dispatch:
    inputs:
      git-ref:
        description: "Git ref to release from"
        required: false
        default: "main"
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-path: bun.lockb

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: timeout 120 bun install --frozen-lockfile || npm install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Set version
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:${{ inputs.git-ref }} --tags

      - name: Generate release notes and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            --target "${{ inputs.git-ref }}"
