name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          cache: true
          cache-dependency-path: bun.lockb

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Update playground dependency
        run: bun install --force

      - name: Build playground
        run: cd playground && bun run build

      - name: Test
        run: bun test
