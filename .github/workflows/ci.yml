name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-path: bun.lockb

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: timeout 120 bun install --frozen-lockfile || npm install

      - name: Typecheck
        run: bun run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-path: bun.lockb

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: timeout 120 bun install --frozen-lockfile || npm install

      - name: Build
        run: bun run build
