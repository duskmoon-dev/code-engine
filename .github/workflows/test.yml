name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-path: bun.lockb

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: timeout 120 bun install --frozen-lockfile || npm install

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun test --coverage 2>&1 | tee coverage-report.txt

      - name: Display coverage report
        if: always()
        run: cat coverage-report.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report.txt

      - name: Build
        run: bun run build
